name: 算法验证 (Validate Algorithm PR)

on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened, ready_for_review ]
    paths:
      - 'algorithms/**'
      - 'shared/**'
      - 'benchmarks/**'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. 正确性验证：运行所有算法的单元测试
  # ──────────────────────────────────────────────
  correctness:
    name: 正确性验证
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 安装 .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 运行所有算法测试
        run: |
          find algorithms -name '*.Tests.csproj' | while read proj; do
            echo "::group::Testing $proj"
            dotnet test "$proj" --configuration Release --logger "console;verbosity=normal"
            echo "::endgroup::"
          done

  # ──────────────────────────────────────────────
  # 2. 性能验证：运行基准测试并检查排名
  # ──────────────────────────────────────────────
  performance:
    name: 性能验证
    needs: correctness
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: 检测新增算法目录
        id: detect-algo
        # 仅在 pull_request 事件时才能比对 base 分支；workflow_dispatch 时跳过检测
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin refs/heads/${{ github.base_ref }} --depth=1
          NEW=$(git diff --name-only --diff-filter=A FETCH_HEAD HEAD \
            | grep '^algorithms/' \
            | grep -oE '^algorithms/[^/]+' \
            | sort -u \
            | sed 's|algorithms/||' \
            | tr '\n' ',')
          NEW="${NEW%,}"
          echo "new_algorithm_dirs=${NEW}" >> "$GITHUB_OUTPUT"
          if [ -n "$NEW" ]; then
            echo "is_new_algorithm=true" >> "$GITHUB_OUTPUT"
            echo "✅ 检测到新增算法目录: $NEW"
          else
            echo "is_new_algorithm=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ 未检测到新增算法目录，性能测试仅供参考，不作为合并门槛。"
          fi

      - name: 安装 .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 构建基准测试项目
        run: |
          dotnet build benchmarks/AlgorithmBenchmarks/AlgorithmBenchmarks.csproj \
            --configuration Release

      - name: 运行性能测试
        id: benchmark
        run: |
          dotnet run --project benchmarks/AlgorithmBenchmarks/AlgorithmBenchmarks.csproj \
            --configuration Release -- --simple 2>&1 | tee /tmp/benchmark_output.txt
          echo "benchmark_output_file=/tmp/benchmark_output.txt" >> "$GITHUB_OUTPUT"

      - name: 检查新算法排名是否在前 10
        # 仅在 PR 新增了算法目录时才作为门槛检查
        if: steps.detect-algo.outputs.is_new_algorithm == 'true'
        run: |
          FAILED=0
          IFS=',' read -ra DIRS <<< "${{ steps.detect-algo.outputs.new_algorithm_dirs }}"
          for DIR in "${DIRS[@]}"; do
            echo "--- 检查目录: $DIR ---"
            if ! python3 .github/scripts/check_ranking.py \
              --output-file "${{ steps.benchmark.outputs.benchmark_output_file }}" \
              --top 10 \
              --new-algorithm "$DIR"; then
              FAILED=1
            fi
          done
          exit $FAILED

      - name: 更新性能排行榜文件
        run: |
          python3 .github/scripts/update_rankings.py \
            --output-file "${{ steps.benchmark.outputs.benchmark_output_file }}" \
            --rankings-file docs/performance-rankings.md

      - name: 提交排行榜更新到 PR 分支
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/performance-rankings.md
          if git diff --staged --quiet; then
            echo "ℹ️ 排行榜无变化，无需提交。"
          else
            git commit -m "chore: 更新性能排行榜 [skip ci]"
            git pull --rebase origin ${{ github.head_ref }}
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: 通知 fork PR 无法自动推送排行榜
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "ℹ️ 来自 fork 仓库的 PR，排行榜更新无法直接推送到 PR 分支，将在合并后由定期任务自动更新。"

      - name: 将性能结果写入 PR 评论
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outputFile = '${{ steps.benchmark.outputs.benchmark_output_file }}';
            let output = '';
            try {
              output = fs.readFileSync(outputFile, 'utf8');
            } catch (e) {
              console.error('读取基准测试结果失败:', e);
              output = '(未找到基准测试结果)';
            }
            const isNewAlgo = '${{ steps.detect-algo.outputs.is_new_algorithm }}' === 'true';
            const newDirs = '${{ steps.detect-algo.outputs.new_algorithm_dirs }}';
            const hint = isNewAlgo
              ? `> 🆕 检测到新增算法目录：\`${newDirs}\`，已对其排名进行门槛检查。\n\n`
              : `> ℹ️ 本次 PR 未检测到新增算法，性能数据仅供参考。\n\n`;
            const body = `## ⚡ 性能测试结果\n\n${hint}\`\`\`\n${output}\n\`\`\`\n`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
